<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
    <h1>👤 회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>

    <form action="signUpResult.html" method="get">
        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="userID">아이디:</label>
                <input type="text" id="userID" name="userID" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                <small>(필수)</small>
            </p>
            <p>
                <label for="userPassword">비밀번호:</label>
                <input type="password" id="userPassword" name="userPassword" minlength="8" required placeholder="8자 이상 입력">
                <small>(필수)</small>
            </p>
            <p>
                <label for="userEmail">이메일: </label>
                <!-- 이메일 입력 필드를 그룹화해서 화면 안에 한 줄에 들어올 수 있도록 함 -->
                <div class="email-group">
                    <input type="text" id="userEmail" name="userEmail" placeholder="example">
                    <span>@</span>
                    <select name="emailDomain">
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                </div>
            </p>
        </fieldset>
        <br>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label for="userName">이름:</label>
                <input type="text" id="userName" name="userName">
            </p>
            <p>
                <label for="userBirth">생년월일: </label>
                <input type="date" id="userBirth" name="userBirth">
            </p>
            <p>
                관심 분야 (중복 선택 가능):<br>
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
            </p>
            <p>
                <label for="path">가입 경로: </label>
                <select id="path" name="path">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">검색엔진</option>
                    <option value="sns">SNS</option>
                    <option value="friend">지인 추천</option>
                    <option value="other">기타</option>
                </select>
            </p>
        </fieldset>
        <br>

        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사 :</label><br>
                <textarea id="intro" name="intro" rows="5" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </p>
        </fieldset>
        <br>

        <input type="submit" value="동의하고 회원가입">
        <input type="reset" value="다시 작성">
        </form>
        </div>
</body>
</html>
