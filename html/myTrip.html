<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>🌏 나의 여행 앨범 🎵</h1>

        <div class="trip-card">
            <figure>
                <audio controls>
                    <source src="../media/music.mp3" type="audio/mpeg">
                </audio>
            </figure>
        </div>

        <div class="trip-card">
            <figure>
                <img src="../media/리장.jpg" alt="리장 호도협" width="400">
                <figcaption>리장 호도협 (2025년)</figcaption>
            </figure>
        </div>

        <div class="trip-card">
            <figure>
                <img src="../media/세부.jpg" alt="세부 탑스힐" width="400">
                <figcaption>세부 탑스힐 (2024년)</figcaption>
            </figure>
        </div>

        <div class="trip-card">
            <figure>
                <img src="../media/홋카이도.jpg" alt="홋카이도 대설산" width="400">
                <figcaption>홋카이도 대설산 (2025년)</figcaption>
            </figure>
        </div>

        <div class="trip-card">
            <h2>📽️ 나의 여행 브이로그</h2>
            <figure>
                <video width="400" controls>
                    <source src="../media/video.mp4" type="video/mp4">
                </video>
                <figcaption>리장의 아름다운 음악 ✈️</figcaption>
            </figure>
        </div>
    </div>
</body>
</html>
